name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # 基础检查
  check:
    name: 代码检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 显示变更文件
        run: |
          echo "本次推送包含以下文件:"
          git diff --name-only HEAD~1 HEAD 2>/dev/null || ls -la

  # 发布 job（仅在 push 到 main 时触发）
  deploy:
    name: 发布
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 发布确认
        run: |
          echo "✅ 代码已成功推送到 main 分支"
          echo "提交: ${{ github.sha }}"
          echo "作者: ${{ github.actor }}"
          echo "时间: $(date '+%Y-%m-%d %H:%M:%S')"
